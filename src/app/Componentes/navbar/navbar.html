<nav class="navbar">
  <div class="navbar-logo">
    <a routerLink="/" class="logo-link">BioTech</a>
  </div>

  <ul class="navbar-links">
    <li *ngIf="esAdmin()">
      <a routerLink="/usuarios" routerLinkActive="activo">Usuarios</a>
    </li>

    <li *ngIf="esAdmin()">
      <a routerLink="/pacientes" routerLinkActive="activo">Pacientes</a>
    </li>

    <li *ngIf="esAdmin()">
      <a routerLink="/medicos" routerLinkActive="activo">Médicos</a>
    </li>

    <li *ngIf="esAdmin()">
      <a routerLink="/servicios" routerLinkActive="activo">Servicios</a>
    </li>
