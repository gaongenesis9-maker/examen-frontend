<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <a routerLink="/" class="btn-volver">← Volver al inicio</a>
      <span class="login-badge">Registro</span>
    </div>

    <h2>Crear Cuenta</h2>
    <p class="subtexto-login">
      Registra un nuevo usuario para acceder al sistema BioTech.
    </p>

    <form (ngSubmit)="registrar()">
      <label for="username">Usuario</label>
      <input
        type="text"
        id="username"
        name="username"
        [(ngModel)]="username"
        placeholder="Ingrese su usuario"
      />

      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Ingrese su contraseña"
      />

      <label for="rol">Rol</label>
      <select id="rol" name="rol" [(ngModel)]="rol">
        <option value="PACIENTE">PACIENTE</option>
        <option value="MEDICO">MEDICO</option>
        <option value="ADMIN">ADMIN</option>
      </select>

      <button type="submit">Crear Cuenta</button>

      <p *ngIf="mensajeError" class="error">{{ mensajeError }}</p>
      <p *ngIf="mensajeExito" class="mensaje-exito">{{ mensajeExito }}</p>
    </form>
  </div>
</div>
